name: KR EPS Momentum Daily

on:
  schedule:
    # KST 16:00 = UTC 07:00 (월~금 KST = 월~금 UTC, KR 장 마감 15:30 직후)
    # production v80.22(16:00)와 일관성. yfinance KR 종목 직접 호출(KS/KQ), KRX 로그인 불필요.
    # 한국 공휴일은 daily_runner.py 안에서 자동 skip (holidays 라이브러리).
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

# yfinance rate limit 회피 (US daily-screening과 동일 패턴, 5/2 US 사고 학습)
concurrency:
  group: yfinance-data-fetch
  cancel-in-progress: false

permissions:
  contents: write

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_PRIVATE_ID: ${{ secrets.TELEGRAM_PRIVATE_ID }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  KR_EPS_PRINT_MSG: '1'  # 전송 메시지를 CI 로그에도 출력 (디버그/확인용, 전송 동작 무영향)

jobs:
  kr-eps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          # daily_runner.py 의존성 (US와 동일)
          pip install -r kr_eps_momentum/requirements.txt
          # Optional google-genai (AI 분석) — 실패 시 무시 (없어도 run_daily 동작)
          pip install -r yf_eps_workspace/requirements.txt

      - name: Inject config (token + git_enabled for GHA)
        run: |
          python -c "
          import json
          import os
          with open('kr_eps_momentum/config_kr.json', encoding='utf-8') as f: cfg = json.load(f)
          cfg['telegram_enabled'] = True
          cfg['telegram_bot_token'] = os.environ.get('TELEGRAM_BOT_TOKEN', '')
          cfg['telegram_private_id'] = os.environ.get('TELEGRAM_PRIVATE_ID', '')
          cfg['gemini_api_key'] = os.environ.get('GEMINI_API_KEY', '')
          cfg['git_enabled'] = False  # GHA가 별도 commit step 처리
          cfg['is_github_actions'] = True
          with open('kr_eps_momentum/config_kr.json', 'w', encoding='utf-8') as f: json.dump(cfg, f, indent=2, ensure_ascii=False)
          print('config injected')
          "

      - name: Check KR business day (휴장일 skip)
        id: bizday
        run: |
          python -c "
          from datetime import datetime, timezone, timedelta
          import sys
          today = (datetime.now(timezone.utc) + timedelta(hours=9)).date()  # KST (UTC 새벽 수동 트리거 오스킵 방지)
          try:
              import holidays
              kr = holidays.country_holidays('KR', years=[today.year])
              if today.weekday() >= 5 or today in kr:
                  print(f'SKIP: {today} (weekday={today.weekday()}, holiday={today in kr})')
                  sys.exit(2)
              print(f'BUSINESS DAY (KST): {today}')
          except ImportError:
              if today.weekday() >= 5:
                  sys.exit(2)
          "
        continue-on-error: true

      # 자율주행 6/1: production v80.22 안전망 패턴 — DB backup 자동화
      - name: Backup DB before run (v83.2 패턴)
        if: steps.bizday.outcome == 'success'
        run: |
          if [ -f kr_eps_momentum/eps_momentum_data_kr.db ]; then
            DATE=$(TZ=Asia/Seoul date +%Y%m%d)
            cp kr_eps_momentum/eps_momentum_data_kr.db "kr_eps_momentum/eps_momentum_data_kr.db.bak_${DATE}"
            # 7일 이상 된 backup 삭제 (저장공간 관리)
            find kr_eps_momentum/ -name 'eps_momentum_data_kr.db.bak_*' -mtime +7 -delete 2>/dev/null || true
            echo "DB backup: bak_${DATE}"
          fi

      - name: Run KR daily_runner (US 완전 모방, 5,178줄)
        if: steps.bizday.outcome == 'success'
        run: |
          cd kr_eps_momentum
          python daily_runner.py
        continue-on-error: true

      # 자율주행 6/1: post-run 검증 (v80.22 _validate_ranking 패턴) — 매수후보 0건 시 알림
      - name: Validate run output (production v80.22 안전망 패턴)
        if: steps.bizday.outcome == 'success'
        continue-on-error: true
        run: |
          # GHA 로그에서 "메인 N, 턴어라운드 M" 추출 → N+M < 10 시 비정상 의심
          # 간단한 sqlite 검증으로 대체
          python -c "
          import sqlite3, os, requests, sys
          db = 'kr_eps_momentum/eps_momentum_data_kr.db'
          if not os.path.exists(db):
              print('DB 없음 — 알림 발송')
              sys.exit(1)
          try:
              conn = sqlite3.connect(db)
              c = conn.cursor()
              # 오늘 매수후보 수 (composite_rank IS NOT NULL = 메인 후보)
              n = c.execute('SELECT COUNT(*) FROM ntm_screening WHERE date=(SELECT MAX(date) FROM ntm_screening) AND composite_rank IS NOT NULL').fetchone()[0]
              print(f'오늘 매수후보: {n}건')
              if n < 10:
                  # 개인봇 알림
                  tok = os.environ.get('TELEGRAM_BOT_TOKEN', '')
                  pid = os.environ.get('TELEGRAM_PRIVATE_ID', '')
                  if tok and pid:
                      msg = f'⚠️ KR EPS 비정상 감지\n오늘 매수후보 {n}건 (정상: 100+)\n수동 점검 필요'
                      requests.post(f'https://api.telegram.org/bot{tok}/sendMessage',
                                    data={'chat_id': pid, 'text': msg}, timeout=15)
                  sys.exit(1)
          except Exception as e:
              print(f'검증 실패: {e}')
          "

      - name: Commit accumulated data (DB + cache + backups)
        run: |
          # backup은 7일치 누적 → commit
          git add kr_eps_momentum/eps_momentum_data_kr.db kr_eps_momentum/eps_momentum_data_kr.db.bak_* yf_eps_workspace/data_cache_yf/ kr_eps_momentum/ticker_info_cache.json 2>/dev/null || true
          # config_kr.json은 token 주입돼있으니 제외
          git checkout -- kr_eps_momentum/config_kr.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "KR EPS daily $(TZ=Asia/Seoul date +%Y-%m-%d) (+backup)"
          git pull --no-rebase -X ours origin main || true
          git push
