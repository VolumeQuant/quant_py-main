name: KR EPS Report (one-off to private bot)

# 수동 트리거 전용 — 자율점검 보고서를 개인봇으로 전송 (stdlib만 사용, pip 불필요).
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_PRIVATE_ID: ${{ secrets.TELEGRAM_PRIVATE_ID }}

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send report to private bot
        run: python kr_eps_momentum/send_report.py kr_eps_momentum/REPORT_FOR_USER.txt
